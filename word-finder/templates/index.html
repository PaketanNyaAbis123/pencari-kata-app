<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencari Kata Umum</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 12px;
            width: 60%;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #3498db; }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #2980b9; }
        .pesan {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #27ae60;
        }
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 20px;
            text-align: left;
        }
        .word-item {
            background: #ecf0f1;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 15px;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌟 Pencari Kata Umum</h1>
        <p>Ketik awalan huruf untuk mencari kata bahasa Indonesia</p>

        <form method="POST" class="search-box">
            <input type="text" name="awalan" placeholder="Mau cari awalan apa, bro?" value="{{ awalan }}" required autocomplete="off">
            <button type="submit">Cari (Wuzzz)</button>
        </form>

        {% if pesan %}
            <div class="pesan">{{ pesan }}</div>
        {% endif %}

        {% if hasil %}
            <div class="word-grid">
                {% for kata in hasil %}
                    <div class="word-item">{{ kata }}</div>
                {% endfor %}
            </div>
        {% endif %}
    </div>

</body>
</html>
